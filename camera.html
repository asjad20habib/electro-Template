  <script>
function toggleCart(btn){
  let card = btn.closest('.product-card');
  card.classList.toggle('show-cart');
}
</script>

<script>


let arr = [
  { name: "Laptop", category: "Laptops", element: document.querySelectorAll(".product-card")[0] },
  { name: "Headset", category: "Accessories", element: document.querySelectorAll(".product-card")[1] },
  { name: "Camera", category: "Cameras", element: document.querySelectorAll(".product-card")[2] }
];

select.addEventListener("change", function() {
  let selectedCategory = select.value;   // current value
  
  for (let i = 0; i < arr.length; i++) {
    if (selectedCategory === "All Categories" || arr[i].category === selectedCategory) {
      arr[i].element.style.display = "block"; // show
    } else {
      arr[i].element.style.display = "none";  // hide
    }
  }
});




</script>
